version: '3.8'

services:
  drawdb:
    image: node:20-alpine
    container_name: drawdb
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm run dev -- --host"
    restart: unless-stopped
