version: '3.8'

services:
  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:stable-alpine
    container_name: drawdb-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - FRONTEND_UPSTREAM=drawdb-frontend:80
      - BACKEND_UPSTREAM=drawdb-backend:3001
    networks:
      - drawdb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - drawdb-frontend
      - drawdb-backend

  # Frontend Production Build
  drawdb-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - VITE_APP_ENV=production
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
        - VITE_DEBUG=${VITE_DEBUG:-false}
        - VITE_VERCEL_ANALYTICS_ENABLED=${VITE_VERCEL_ANALYTICS_ENABLED:-true}
        - VITE_SPEED_INSIGHTS_ENABLED=${VITE_SPEED_INSIGHTS_ENABLED:-true}
    container_name: drawdb-frontend-prod
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs/frontend:/var/log/nginx
    networks:
      - drawdb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Backend API Server
  drawdb-backend:
    build:
      context: ./docker/backend-mock
      dockerfile: Dockerfile.production
    container_name: drawdb-backend-prod
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-100}
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - drawdb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: drawdb-postgres-prod
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=drawdb
      - POSTGRES_USER=drawdb
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-strong_password_here}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./backups/postgres:/backups
    networks:
      - drawdb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawdb -d drawdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: drawdb-redis-prod
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - drawdb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: redis-server /usr/local/etc/redis/redis.conf
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Backup Service
  backup:
    image: postgres:16-alpine
    container_name: drawdb-backup-prod
    environment:
      - POSTGRES_DB=drawdb
      - POSTGRES_USER=drawdb
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-strong_password_here}
      - BACKUP_RETENTION_DAYS=7
    volumes:
      - ./backups/postgres:/backups
      - ./docker/scripts/backup.sh:/backup.sh:ro
    networks:
      - drawdb-network
    restart: "no"
    depends_on:
      - postgres
    command: ["sh", "/backup.sh"]
    deploy:
      replicas: 0

  # Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: drawdb-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - drawdb-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  drawdb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16